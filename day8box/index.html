<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: skyblue;
            width: 300px;
            height: 150px;

            border: 1px solid black;

            border-radius: 10px;

            padding: 20px;
            text-align: center;
             margin: 10px; 
            /* margin: auto; */

            /* box-sizing: content-box;
            It will include width+ padding+ margin+ border */
            box-sizing: border-box;

            /* box-sizing: border-box; only original width size */

            
        }
        
        p{
            border: 1px solid red;
            padding-top: 20px;
        }

    </style>
</head>
<body>
    <div class="box">
        <P>Hello guys</P>
      
    
    </div>
    

    <div class="box">
        <P>Books</P>
      
    
    </div>
</body>
</html>
