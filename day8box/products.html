<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            gap: 20px;  
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;

        }
        .product{
            border: 1px solid brown;
            border: 1px solid black;
            border-radius: 12px;
            height: 300px;
            width: 250px;
            padding: 12px;
            margin-bottom: 15px;
            padding: 12px;
            text-align: center;

            box-shadow: 4px 4px 8px black;
            
            /* box-shadow: Xaxis Yaxis Spread-Radius Color; */
            box-shadow:     4px    4px       8px             black;

        }
        .product h2{
            border-bottom: 1px solid black;

        }
        .product img{
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
        }

        
        .product button{
            background-color: orange;
            border: none;
            padding: 10px;
            border-radius: 12px;
            width: 90%;
        }


        .product:hover{
            transform: rotateY(200deg);
            transition: 1s;
            width: 90%;
        }




    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/20385205/pexels-photo-20385205.jpeg">
        <h2>Headphone</h2>
        <p>Rs 2,499</p>
        <button>Buy Now</button>

    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/5793947/pexels-photo-5793947.jpeg">
        <h2>Laptop</h2>
        <p>Rs 25,000</p>
        <button>Buy Now</button>

    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/33797585/pexels-photo-33797585.jpeg">
        <h2>Mobilephone</h2>
        <p>9,999</p>
        <button>Buy Now</button>

    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/29521391/pexels-photo-29521391.jpeg">
        <h2>shoes</h2>
        <p>1,999</p>
        <button>Buy Now</button>

    </div>

    
</body>
</html>
